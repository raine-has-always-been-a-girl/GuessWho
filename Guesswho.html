        :root {

            --Richard: true;
            --Robert: true;

    <script>
        function toggle(character) {
            document.querySelector(':root').style.setProperty('--' + character, !JSON.parse(getComputedStyle(document.querySelector(':root')).getPropertyValue('--' + character)));

            if (getComputedStyle(document.querySelector(':root')).getPropertyValue('--' + character).trim() === 'false') {
                document.querySelector('img[alt="' + character + ' big red x"]').style.visibility = 'visible';
            } else {
                document.querySelector('img[alt="' + character + ' big red x"]').style.visibility = 'hidden';
            }
        }
    </script>
