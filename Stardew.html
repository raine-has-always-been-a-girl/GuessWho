    <style>
        :root {
            /* Bachelors */
            --Alex: true;
            --Elliott: true;
            --Harvey: true;
            --Sam: true;
            --Sebastian: true;
            --Shane: true;

            /* Bachelorettes */
            --Abigail: true;
            --Emily: true;
            --Haley: true;
            --Leah: true;
            --Maru: true;
            --Penny: true;

            /* other */
            --Caroline: true;
            --Clint: true;
            --Demetrius: true;
            --Jodi: true;
            --Krobus: true;
            --Lewis: true;
            --Linus: true;
            --Marnie: true;
            --Pierre: true;
            --Robin: true;
            --Willy: true;
            --Wizard: true;
        }
        
        .BigRedX {
            width: 12.5vw;
            display: inline;
            visibility: hidden;
            position: absolute;
            top: 0%;
        }

        .CharacterGrid {
            display: grid;
            grid-template: repeat(3, auto) / repeat(8, 12.5vw);
            place-content: center center;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .CharacterGrid div{
            display: flex;
            flex-direction: column;
            text-align: center;
            place-content: center center;
            position: relative;
        }
        
    </style>

    <script>
        function toggle(character) {
            document.querySelector(':root').style.setProperty('--' + character, !JSON.parse(getComputedStyle(document.querySelector(':root')).getPropertyValue('--' + character)));

            if (getComputedStyle(document.querySelector(':root')).getPropertyValue('--' + character).trim() === 'false') {
                document.querySelector('img[alt="' + character + ' big red x"]').style.visibility = 'visible';
            } else {
                document.querySelector('img[alt="' + character + ' big red x"]').style.visibility = 'hidden';
            }
        }
    </script>
